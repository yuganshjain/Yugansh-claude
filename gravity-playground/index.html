<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Playground — Build Your Universe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000308;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    user-select: none;
    cursor: crosshair;
  }

  canvas#main {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  /* ── UI overlay ── */
  #ui {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Title */
  #title-block {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }
  #title-block h1 {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 10px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(120,180,255,0.6);
  }
  #title-block p {
    font-size: 11px;
    letter-spacing: 6px;
    color: rgba(180,200,255,0.5);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Stats */
  #stats {
    position: absolute;
    top: 18px;
    right: 22px;
    text-align: right;
    pointer-events: none;
  }
  #stats span {
    display: block;
    font-size: 11px;
    color: rgba(180,200,255,0.45);
    letter-spacing: 1px;
    line-height: 1.7;
  }

  /* Pause badge */
  #pause-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    pointer-events: none;
    display: none;
    text-shadow: 0 0 30px rgba(120,180,255,0.8);
  }

  /* Bottom controls */
  #controls {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    pointer-events: all;
    align-items: center;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    outline: none;
    font-family: inherit;
  }
  .btn:hover {
    background: rgba(255,255,255,0.14);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  .btn.active {
    background: rgba(120,180,255,0.25);
    border-color: rgba(120,180,255,0.6);
    color: #fff;
    box-shadow: 0 0 18px rgba(100,160,255,0.35);
  }
  .btn.danger:hover {
    background: rgba(255,80,80,0.2);
    border-color: rgba(255,80,80,0.5);
    color: #ff8888;
  }

  /* Divider between mode buttons and action buttons */
  .btn-sep {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.12);
    margin: 0 2px;
    pointer-events: none;
  }

  /* Hint */
  #hint {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(180,200,255,0.3);
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Save button — top left */
  #btn-save {
    position: absolute;
    top: 18px;
    left: 22px;
    pointer-events: all;
  }
</style>
</head>
<body>

<canvas id="main"></canvas>

<div id="ui">
  <div id="title-block">
    <h1>Gravity Playground</h1>
    <p>Build Your Universe</p>
  </div>

  <div id="stats">
    <span id="stat-bodies">0 bodies</span>
    <span id="stat-fps">0 fps</span>
  </div>

  <div id="pause-badge">⏸ Paused</div>

  <button class="btn" id="btn-save" title="Save snapshot">📸 Save Image</button>

  <div id="controls">
    <button class="btn active" id="btn-planet" data-mode="planet">🪐 Planet</button>
    <button class="btn" id="btn-star"   data-mode="star">⭐ Star</button>
    <button class="btn" id="btn-bh"     data-mode="blackhole">⚫ Black Hole</button>
    <div class="btn-sep"></div>
    <button class="btn" id="btn-random">✨ Random</button>
    <button class="btn danger" id="btn-clear">✕ Clear</button>
  </div>

  <div id="hint">Click to spawn · Drag to launch · Space to pause · 1/2/3 switch · R random · C clear</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  GRAVITY PLAYGROUND  —  single-file vanilla canvas engine
// ═══════════════════════════════════════════════════════════════

const canvas  = document.getElementById('main');
const ctx     = canvas.getContext('2d');

// Offscreen nebula canvas
const nebCanvas = document.createElement('canvas');
const nebCtx    = nebCanvas.getContext('2d');

// ── Constants ──────────────────────────────────────────────────
const G          = 0.5;
const SOFTENING  = 50;
const SOFT2      = SOFTENING * SOFTENING;
const MAX_DT     = 3;
const OFF_SCREEN = 2000;

// ── State ──────────────────────────────────────────────────────
let bodies     = [];
let particles  = [];
let bgStars    = [];
let mode       = 'planet';
let paused     = false;
let lastTime   = 0;
let fps        = 0;
let fpsAccum   = 0;
let fpsFrames  = 0;

// Drag state
let dragging   = false;
let dragStart  = null;
let dragEnd    = null;

// Twinkle phase offsets
const twinklePhases = [];

// ── Palette ────────────────────────────────────────────────────
const PLANET_COLORS = [
  ['#4FC3F7','#0288D1'],  // ice blue
  ['#AED581','#558B2F'],  // lime
  ['#FF8A65','#BF360C'],  // rust
  ['#CE93D8','#7B1FA2'],  // violet
  ['#80DEEA','#00838F'],  // cyan
  ['#FFCC02','#F57F17'],  // amber
  ['#F48FB1','#AD1457'],  // pink
  ['#A5D6A7','#2E7D32'],  // green
  ['#FFAB91','#E64A19'],  // deep orange
  ['#B39DDB','#512DA8'],  // deep purple
];

const STAR_COLORS = [
  ['#FFFDE7','#FFF9C4'],  // warm white
  ['#FFF8E1','#FFECB3'],  // cream
  ['#E3F2FD','#BBDEFB'],  // cool white
  ['#FFF3E0','#FFE0B2'],  // orange-white
];

// ── Resize ─────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  nebCanvas.width  = canvas.width;
  nebCanvas.height = canvas.height;
  initNebula();
}
window.addEventListener('resize', resize);

// ── Helper ─────────────────────────────────────────────────────
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
function randInt(lo, hi) { return Math.floor(rand(lo, hi+1)); }
function choice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── Background Stars ───────────────────────────────────────────
function initBgStars() {
  bgStars = [];
  twinklePhases.length = 0;
  for (let i = 0; i < 200; i++) {
    bgStars.push({
      x: rand(0, canvas.width),
      y: rand(0, canvas.height),
      r: rand(0.2, 1.4),
      bright: rand(0.3, 1.0),
    });
    twinklePhases.push(rand(0, Math.PI * 2));
  }
}

function drawBgStars(t) {
  for (let i = 0; i < bgStars.length; i++) {
    const s = bgStars[i];
    const twinkle = 0.5 + 0.5 * Math.sin(t * 0.0008 + twinklePhases[i]);
    const alpha   = s.bright * (0.4 + 0.6 * twinkle);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    ctx.fill();
  }
}

// ── Nebula (offscreen) ─────────────────────────────────────────
function initNebula() {
  nebCtx.clearRect(0, 0, nebCanvas.width, nebCanvas.height);

  const nebulae = [
    { x: rand(0.1,0.4), y: rand(0.1,0.4), rx: rand(180,320), ry: rand(120,220), color: '#7B2FBE' },
    { x: rand(0.5,0.9), y: rand(0.05,0.35), rx: rand(200,350), ry: rand(140,260), color: '#1565C0' },
    { x: rand(0.6,0.95), y: rand(0.5,0.9), rx: rand(160,300), ry: rand(100,200), color: '#00838F' },
    { x: rand(0.05,0.35), y: rand(0.55,0.92), rx: rand(200,340), ry: rand(130,240), color: '#4A148C' },
    { x: rand(0.3,0.7),  y: rand(0.3,0.7),  rx: rand(140,260), ry: rand(100,180), color: '#0D47A1' },
  ];

  nebCtx.filter = 'blur(60px)';
  for (const n of nebulae) {
    const gx = n.x * nebCanvas.width;
    const gy = n.y * nebCanvas.height;
    const grad = nebCtx.createRadialGradient(gx, gy, 0, gx, gy, Math.max(n.rx, n.ry));
    grad.addColorStop(0,   hexToRgba(n.color, 0.22));
    grad.addColorStop(0.4, hexToRgba(n.color, 0.12));
    grad.addColorStop(1,   hexToRgba(n.color, 0));
    nebCtx.beginPath();
    nebCtx.ellipse(gx, gy, n.rx, n.ry, rand(0, Math.PI), 0, Math.PI*2);
    nebCtx.fillStyle = grad;
    nebCtx.fill();
  }
  nebCtx.filter = 'none';
}

// ── Particle class ─────────────────────────────────────────────
class Particle {
  constructor(x, y, color) {
    const angle = rand(0, Math.PI*2);
    const speed = rand(1.5, 5.5);
    this.x  = x; this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.r  = rand(1.5, 4);
    this.color = color;
    this.life  = 1.0;
    this.decay = rand(0.018, 0.038);
  }
  update() {
    this.x    += this.vx;
    this.y    += this.vy;
    this.vx   *= 0.97;
    this.vy   *= 0.97;
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.life * this.life;
    ctx.shadowBlur  = 6;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

// ── Body class ─────────────────────────────────────────────────
class Body {
  constructor(x, y, vx, vy, type, massOverride) {
    this.x  = x;  this.y  = y;
    this.vx = vx; this.vy = vy;
    this.type = type;
    this.ax = 0; this.ay = 0;
    this.trail  = [];
    this.spawnT = Date.now();
    this.bhAngle = rand(0, Math.PI*2); // for accretion rotation

    // Assign mass & radius by type
    if (type === 'planet') {
      this.mass   = massOverride || rand(20, 80);
      this.radius = 3 + this.mass * 0.12;
      const col   = choice(PLANET_COLORS);
      this.colorA = col[0]; this.colorB = col[1];
    } else if (type === 'star') {
      this.mass   = massOverride || rand(300, 800);
      this.radius = 7 + this.mass * 0.05;
      const col   = choice(STAR_COLORS);
      this.colorA = col[0]; this.colorB = col[1];
    } else { // blackhole
      this.mass   = massOverride || rand(1000, 3000);
      this.radius = 14 + this.mass * 0.015;
      this.colorA = '#FF8F00'; this.colorB = '#E65100';
    }
  }

  get spawnScale() {
    const age = (Date.now() - this.spawnT) / 300; // 300ms spawn-in
    return Math.min(1, age);
  }

  update(dt) {
    this.vx += this.ax * dt;
    this.vy += this.ay * dt;
    this.x  += this.vx * dt;
    this.y  += this.vy * dt;
    this.ax  = 0;
    this.ay  = 0;
    this.bhAngle += 0.018;

    // Trail
    if (this.type !== 'blackhole') {
      this.trail.push({ x: this.x, y: this.y });
      const maxTrail = this.type === 'star' ? 60 : 90;
      if (this.trail.length > maxTrail) this.trail.shift();
    }
  }

  draw() {
    const s = this.spawnScale;
    if (s <= 0) return;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(s, s);

    if      (this.type === 'planet')    this._drawPlanet();
    else if (this.type === 'star')      this._drawStar();
    else                                this._drawBlackHole();

    ctx.restore();
  }

  _drawPlanet() {
    const r = this.radius;

    // Orbital trail
    this._drawTrail();

    // Outer glow
    ctx.shadowBlur  = r * 2.5;
    ctx.shadowColor = this.colorA;

    // Sphere gradient
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.05, 0, 0, r);
    grad.addColorStop(0,   this.colorA);
    grad.addColorStop(0.6, this.colorB);
    grad.addColorStop(1,   hexToRgba(this.colorB, 0.6));
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Highlight specular
    ctx.shadowBlur = 0;
    const spec = ctx.createRadialGradient(-r*0.35, -r*0.35, 0, -r*0.35, -r*0.35, r*0.55);
    spec.addColorStop(0,   'rgba(255,255,255,0.45)');
    spec.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.fillStyle = spec;
    ctx.fill();
  }

  _drawStar() {
    const r = this.radius;
    this._drawTrail();

    // Corona glow rings
    for (let i = 3; i >= 1; i--) {
      ctx.beginPath();
      ctx.arc(0, 0, r * (1 + i * 0.5), 0, Math.PI*2);
      ctx.fillStyle = hexToRgba(this.colorA, 0.04 / i);
      ctx.fill();
    }

    // Cross-ray effect
    const rayLen = r * 3.2;
    const rayW   = r * 0.25;
    ctx.save();
    for (let a = 0; a < 4; a++) {
      ctx.rotate(Math.PI / 4);
      const rg = ctx.createLinearGradient(-rayLen, 0, rayLen, 0);
      rg.addColorStop(0,   'rgba(255,255,220,0)');
      rg.addColorStop(0.5, hexToRgba(this.colorA, 0.55));
      rg.addColorStop(1,   'rgba(255,255,220,0)');
      ctx.beginPath();
      ctx.ellipse(0, 0, rayLen, rayW, 0, 0, Math.PI*2);
      ctx.fillStyle = rg;
      ctx.fill();
    }
    ctx.restore();

    // Main star body
    ctx.shadowBlur  = r * 4;
    ctx.shadowColor = this.colorA;
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
    grad.addColorStop(0, '#FFFFFF');
    grad.addColorStop(0.3, this.colorA);
    grad.addColorStop(1,   hexToRgba(this.colorA, 0.5));
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  _drawBlackHole() {
    const r = this.radius;

    // Outer gravitational lensing ring
    for (let i = 0; i < 3; i++) {
      const ringR  = r * (2.2 + i * 0.7);
      const alpha  = 0.06 - i * 0.015;
      ctx.beginPath();
      ctx.arc(0, 0, ringR, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,160,30,${alpha})`;
      ctx.lineWidth   = 1.5;
      ctx.stroke();
    }

    // Accretion disk — rotating flattened ellipse
    ctx.save();
    ctx.rotate(this.bhAngle);
    const diskW = r * 2.8;
    const diskH = r * 0.5;
    const diskGrad = ctx.createLinearGradient(-diskW, 0, diskW, 0);
    diskGrad.addColorStop(0,   'rgba(255,100,0,0)');
    diskGrad.addColorStop(0.3, 'rgba(255,160,20,0.7)');
    diskGrad.addColorStop(0.5, 'rgba(255,220,80,0.9)');
    diskGrad.addColorStop(0.7, 'rgba(255,160,20,0.7)');
    diskGrad.addColorStop(1,   'rgba(255,100,0,0)');
    ctx.beginPath();
    ctx.ellipse(0, 0, diskW, diskH, 0, 0, Math.PI*2);
    ctx.fillStyle = diskGrad;
    ctx.shadowBlur  = 18;
    ctx.shadowColor = '#FF8F00';
    ctx.fill();
    ctx.restore();

    // Event horizon — pure dark
    ctx.shadowBlur  = r * 3;
    ctx.shadowColor = 'rgba(255,100,0,0.4)';
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.fillStyle = '#000000';
    ctx.fill();

    // Inner photon ring
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.12, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,160,30,0.55)';
    ctx.lineWidth   = 1.5;
    ctx.shadowBlur  = 10;
    ctx.shadowColor = '#FF8F00';
    ctx.stroke();
  }

  _drawTrail() {
    if (this.trail.length < 3) return;
    const isCtxSave = true;
    ctx.save();
    ctx.resetTransform(); // draw trail in world space
    const maxLen = this.trail.length;
    for (let i = 1; i < maxLen; i++) {
      const alpha = (i / maxLen) * 0.45;
      const w     = (i / maxLen) * (this.type === 'star' ? 2.5 : 1.8);
      ctx.beginPath();
      ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x,   this.trail[i].y);
      ctx.strokeStyle = hexToRgba(this.colorA, alpha);
      ctx.lineWidth   = w;
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ── Physics ─────────────────────────────────────────────────────
function applyGravity() {
  const n = bodies.length;
  for (let i = 0; i < n; i++) {
    for (let j = i+1; j < n; j++) {
      const bi = bodies[i];
      const bj = bodies[j];
      const dx = bj.x - bi.x;
      const dy = bj.y - bi.y;
      const r2 = dx*dx + dy*dy + SOFT2;
      const r  = Math.sqrt(r2);
      const f  = G * bi.mass * bj.mass / r2;
      const fx = f * dx / r;
      const fy = f * dy / r;
      bi.ax += fx / bi.mass;
      bi.ay += fy / bi.mass;
      bj.ax -= fx / bj.mass;
      bj.ay -= fy / bj.mass;
    }
  }
}

function handleCollisions() {
  const toRemove = new Set();
  const n = bodies.length;
  for (let i = 0; i < n; i++) {
    if (toRemove.has(i)) continue;
    for (let j = i+1; j < n; j++) {
      if (toRemove.has(j)) continue;
      const bi = bodies[i];
      const bj = bodies[j];
      const dx = bj.x - bi.x;
      const dy = bj.y - bi.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < bi.radius + bj.radius) {
        // Merge — conserve momentum, absorb smaller into larger
        const totalM  = bi.mass + bj.mass;
        const newVx   = (bi.vx * bi.mass + bj.vx * bj.mass) / totalM;
        const newVy   = (bi.vy * bi.mass + bj.vy * bj.mass) / totalM;
        const newX    = (bi.x  * bi.mass + bj.x  * bj.mass) / totalM;
        const newY    = (bi.y  * bi.mass + bj.y  * bj.mass) / totalM;

        // Determine surviving type: blackhole > star > planet
        const priority = { blackhole: 2, star: 1, planet: 0 };
        const survivor = priority[bi.type] >= priority[bj.type] ? bi : bj;

        // Explosion particles
        const explColor = bi.type === 'blackhole' || bj.type === 'blackhole'
          ? '#FF8F00'
          : (bi.radius >= bj.radius ? bi.colorA : bj.colorA);
        for (let k = 0; k < 25; k++) {
          particles.push(new Particle(newX, newY, explColor));
        }

        // Update survivor
        survivor.x    = newX;
        survivor.y    = newY;
        survivor.vx   = newVx;
        survivor.vy   = newVy;
        survivor.mass = totalM;
        survivor.radius = survivor.type === 'blackhole'
          ? 14 + totalM * 0.015
          : survivor.type === 'star'
            ? 7 + totalM * 0.05
            : 3 + totalM * 0.12;
        // Cap radius so it doesn't get absurdly large
        survivor.radius = Math.min(survivor.radius, 80);

        // Mark the other for removal
        const other = survivor === bi ? j : i;
        toRemove.add(other);
      }
    }
  }
  if (toRemove.size > 0) {
    bodies = bodies.filter((_, idx) => !toRemove.has(idx));
  }
}

function removeOffscreen() {
  bodies = bodies.filter(b => {
    const W = canvas.width  + OFF_SCREEN;
    const H = canvas.height + OFF_SCREEN;
    return b.x > -OFF_SCREEN && b.x < W && b.y > -OFF_SCREEN && b.y < H;
  });
}

// ── Particles helpers ───────────────────────────────────────────
function updateParticles() {
  for (const p of particles) p.update();
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) p.draw();
}

// ── Spawn helpers ───────────────────────────────────────────────
function spawnBody(x, y, vx, vy, type) {
  bodies.push(new Body(x, y, vx, vy, type));
}

// ── Preset scenarios ────────────────────────────────────────────
function addRandom() {
  clearAll();
  const scenario = randInt(0, 2);
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;

  if (scenario === 0) {
    // ── Solar system ──
    const starMass   = rand(500, 800);
    const starBody   = new Body(cx, cy, 0, 0, 'star', starMass);
    bodies.push(starBody);

    const numPlanets = randInt(4, 6);
    for (let i = 0; i < numPlanets; i++) {
      const r     = rand(100, Math.min(cx, cy) * 0.8);
      const angle = rand(0, Math.PI*2);
      const px    = cx + Math.cos(angle) * r;
      const py    = cy + Math.sin(angle) * r;
      // Circular orbit velocity: v = sqrt(G*M/r)
      const v     = Math.sqrt(G * starMass / r) * rand(0.9, 1.1);
      // Perpendicular to radial direction
      const vx    = -Math.sin(angle) * v;
      const vy    =  Math.cos(angle) * v;
      bodies.push(new Body(px, py, vx, vy, 'planet'));
    }

  } else if (scenario === 1) {
    // ── Binary stars ──
    const sep    = rand(120, 220);
    const m1     = rand(400, 700);
    const m2     = rand(300, 600);
    const totM   = m1 + m2;
    // Centre of mass at cx,cy
    const x1 = cx - sep * (m2/totM);
    const x2 = cx + sep * (m1/totM);
    // Orbital velocity
    const v1 = Math.sqrt(G * m2*m2/totM / sep);
    const v2 = Math.sqrt(G * m1*m1/totM / sep);
    bodies.push(new Body(x1, cy, 0, -v1, 'star', m1));
    bodies.push(new Body(x2, cy, 0,  v2, 'star', m2));

    // A few orbiting planets
    const numPlanets = randInt(2, 4);
    for (let i = 0; i < numPlanets; i++) {
      const r     = rand(220, Math.min(cx, cy) * 0.75);
      const angle = rand(0, Math.PI*2);
      const px    = cx + Math.cos(angle) * r;
      const py    = cy + Math.sin(angle) * r;
      const v     = Math.sqrt(G * totM / r) * rand(0.85, 1.15);
      const vx    = -Math.sin(angle) * v;
      const vy    =  Math.cos(angle) * v;
      bodies.push(new Body(px, py, vx, vy, 'planet'));
    }

  } else {
    // ── Chaos ──
    for (let i = 0; i < 8; i++) {
      const px = rand(80, canvas.width  - 80);
      const py = rand(80, canvas.height - 80);
      const type = Math.random() < 0.15 ? 'star' : 'planet';
      const vx = rand(-0.8, 0.8);
      const vy = rand(-0.8, 0.8);
      bodies.push(new Body(px, py, vx, vy, type));
    }
  }
}

function clearAll() {
  bodies    = [];
  particles = [];
}

// ── Draw drag arrow ─────────────────────────────────────────────
function drawDragArrow() {
  if (!dragging || !dragStart || !dragEnd) return;
  const dx = dragEnd.x - dragStart.x;
  const dy = dragEnd.y - dragStart.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len < 5) return;

  ctx.save();
  ctx.setLineDash([5, 6]);
  ctx.lineDashOffset = performance.now() * 0.03;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth   = 1.5;
  ctx.shadowBlur  = 8;
  ctx.shadowColor = 'rgba(180,220,255,0.8)';
  ctx.beginPath();
  ctx.moveTo(dragStart.x, dragStart.y);
  ctx.lineTo(dragEnd.x,   dragEnd.y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  const angle = Math.atan2(dy, dx);
  const hs = 10;
  ctx.beginPath();
  ctx.moveTo(dragEnd.x, dragEnd.y);
  ctx.lineTo(
    dragEnd.x - hs * Math.cos(angle - 0.4),
    dragEnd.y - hs * Math.sin(angle - 0.4)
  );
  ctx.lineTo(
    dragEnd.x - hs * Math.cos(angle + 0.4),
    dragEnd.y - hs * Math.sin(angle + 0.4)
  );
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();

  // Velocity magnitude label
  const speed = len * 0.05;
  ctx.font      = '11px monospace';
  ctx.fillStyle = 'rgba(200,230,255,0.7)';
  ctx.shadowBlur = 0;
  ctx.fillText(`v = ${speed.toFixed(2)}`, dragEnd.x + 10, dragEnd.y - 8);

  ctx.restore();
}

// ── FPS counter ─────────────────────────────────────────────────
function updateFPS(dt) {
  fpsAccum  += dt;
  fpsFrames++;
  if (fpsAccum >= 500) {
    fps        = Math.round(fpsFrames * 1000 / fpsAccum);
    fpsAccum   = 0;
    fpsFrames  = 0;
  }
}

// ── Main loop ───────────────────────────────────────────────────
function tick(timestamp) {
  requestAnimationFrame(tick);

  const rawDt = Math.min(timestamp - lastTime, 50);
  lastTime    = timestamp;
  updateFPS(rawDt);
  const dt    = Math.min(rawDt * 0.06, MAX_DT);  // physics dt, capped

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Nebula
  ctx.drawImage(nebCanvas, 0, 0);

  // Background stars
  drawBgStars(timestamp);

  if (!paused) {
    applyGravity();
    for (const b of bodies) b.update(dt);
    handleCollisions();
    removeOffscreen();
    updateParticles();
  }

  // Draw trails first (behind bodies)
  // Trails are drawn inside each body's draw() via _drawTrail()

  drawParticles();
  for (const b of bodies) b.draw();
  drawDragArrow();

  // HUD
  document.getElementById('stat-bodies').textContent =
    `${bodies.length} bod${bodies.length === 1 ? 'y' : 'ies'}`;
  document.getElementById('stat-fps').textContent = `${fps} fps`;
}

// ── Input ───────────────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging  = true;
  dragStart = getPos(e);
  dragEnd   = { ...dragStart };
});

canvas.addEventListener('mousemove', e => {
  if (dragging) dragEnd = getPos(e);
});

canvas.addEventListener('mouseup', e => {
  if (!dragging) return;
  dragging = false;
  const pos = getPos(e);
  const dx  = pos.x - dragStart.x;
  const dy  = pos.y - dragStart.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const vx  = dist > 5 ? dx * 0.05 : 0;
  const vy  = dist > 5 ? dy * 0.05 : 0;
  spawnBody(dragStart.x, dragStart.y, vx, vy, mode);
  dragStart = null;
  dragEnd   = null;
});

canvas.addEventListener('mouseleave', () => {
  if (dragging) {
    dragging  = false;
    dragStart = null;
    dragEnd   = null;
  }
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY, button: 0 }));
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  canvas.dispatchEvent(new MouseEvent('mouseup', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });

// Keyboard
window.addEventListener('keydown', e => {
  switch(e.key) {
    case '1': setMode('planet');    break;
    case '2': setMode('star');      break;
    case '3': setMode('blackhole'); break;
    case ' ':
      e.preventDefault();
      paused = !paused;
      document.getElementById('pause-badge').style.display = paused ? 'block' : 'none';
      break;
    case 'c': case 'C': clearAll(); break;
    case 'r': case 'R': addRandom(); break;
  }
});

// ── Mode selection ──────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === m);
  });
}

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

document.getElementById('btn-clear').addEventListener('click',  clearAll);
document.getElementById('btn-random').addEventListener('click', addRandom);

// ── Save image ──────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', () => {
  // Composite nebula + main onto a temp canvas for full image
  const tmp  = document.createElement('canvas');
  tmp.width  = canvas.width;
  tmp.height = canvas.height;
  const tctx = tmp.getContext('2d');
  tctx.fillStyle = '#000308';
  tctx.fillRect(0, 0, tmp.width, tmp.height);
  tctx.drawImage(nebCanvas, 0, 0);
  tctx.drawImage(canvas,    0, 0);
  const url  = tmp.toDataURL('image/png');
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'gravity-playground.png';
  a.click();
});

// ── Boot ────────────────────────────────────────────────────────
resize();
initBgStars();
addRandom();
requestAnimationFrame(tick);
</script>
</body>
</html>
