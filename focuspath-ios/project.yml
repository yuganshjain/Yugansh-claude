name: FocusPath
options:
  bundleIdPrefix: com.yuganshjain
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
settings:
  SWIFT_VERSION: "5.10"
packages: {}
targets:
  FocusPath:
    type: application
    platform: iOS
    sources:
      - FocusPath
    resources:
      - FocusPath/Data/Passages.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuganshjain.focuspath
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: FocusPath/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: FocusPath/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        CFBundleDisplayName: FocusPath
        NSUserTrackingUsageDescription: ""
    scheme:
      testTargets:
        - FocusPathTests
  FocusPathTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FocusPathTests
    resources:
      - FocusPath/Data/Passages.json
    dependencies:
      - target: FocusPath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuganshjain.focuspathTests
        GENERATE_INFOPLIST_FILE: YES
